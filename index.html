<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca CEP - Gestão de Carregamento</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-orange: #FF9F5A;
            --dark-orange: #FF7F27;
            --green-primary: #1AB394;
            --dark-green: #159176;
            --yellow-primary: #FFA500;
            --text-primary: #2C3E50;
            --text-secondary: #7F8C8D;
            --bg-light: #F5F7FA;
            --border-color: #E8EAED;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-light);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .header {
            background: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo {
            background: var(--primary-orange);
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1.2rem;
            min-width: 180px;
            text-align: center;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .breadcrumb-dot {
            width: 8px;
            height: 8px;
            background: var(--primary-orange);
            border-radius: 50%;
        }

        .search-box-container {
            flex: 1;
            min-width: 300px;
        }

        .search-box {
            padding: 12px 20px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.95rem;
            width: 100%;
            transition: all 0.3s ease;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--primary-orange);
            box-shadow: 0 0 0 3px rgba(255, 159, 90, 0.1);
        }

        .search-box::placeholder {
            color: var(--text-secondary);
        }

        .header-buttons {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-delete {
            background: white;
            color: var(--primary-orange);
            border: 2px solid var(--primary-orange);
        }

        .btn-delete:hover {
            background: #FFF5F0;
        }

        .btn-export {
            background: var(--green-primary);
            color: white;
        }

        .btn-export:hover {
            background: var(--dark-green);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-file {
            background: var(--yellow-primary);
            color: white;
        }

        .btn-file:hover {
            background: #FF8C00;
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .container {
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin-bottom: 16px
        }

        .stat-icon.blue {
            background: #E3F2FD;
        }

        .stat-icon.orange {
            background: #FFF3E0;
        }

        .stat-icon.green {
            background: #E8F5E9;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-status {
            color: var(--green-primary);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .stat-detail {
            color: var(--primary-orange);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--text-primary);
        }

        .section-title-icon {
            font-size: 1.5rem;
        }

        .table-section {
            background: white;
            border-radius: 12px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .table-header {
            background: #F5F7FA;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
        }

        .search-input {
            padding: 10px 16px;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            width: 250px;
            font-size: 0.95rem;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary-orange);
        }

        .routes-table {
            width: 100%;
            border-collapse: collapse;
        }

        .routes-table thead {
            background: #F5F7FA;
            border-bottom: 2px solid var(--border-color);
        }

        .routes-table th {
            padding: 16px 20px;
            text-align: left;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .routes-table td {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.95rem;
        }

        .routes-table tbody tr {
            transition: background 0.2s ease;
        }

        .routes-table tbody tr:hover {
            background: #F9FAFB;
        }

        .date-cell {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .route-id {
            font-weight: 600;
            color: var(--primary-orange);
        }

        .route-id::before {
            content: '●';
            margin-right: 8px;
            font-size: 1.2rem;
        }

        .vehicle-name {
            color: var(--text-secondary);
        }

        .package-badge {
            background: var(--primary-orange);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85rem;
            min-width: 40px;
            text-align: center;
        }

        .addresses-section {
            margin-top: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .addresses-header {
            background: var(--green-primary);
            color: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
        }

        .addresses-table {
            width: 100%;
            border-collapse: collapse;
        }

        .addresses-table td {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
        }

        .addresses-table tbody tr {
            background: #F0F8F5;
            transition: background 0.2s ease;
        }

        .addresses-table tbody tr:hover {
            background: #E8F5F0;
        }

        .tbr-code {
            font-weight: 600;
            color: var(--text-primary);
        }

        .address-text {
            color: var(--text-secondary);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 200px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border-color);
            border-top-color: var(--primary-orange);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background: #FFEBEE;
            color: #C62828;
            padding: 16px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: #E8F5E9;
            color: #2E7D32;
            padding: 16px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
            }

            .logo-section {
                flex-direction: column;
            }

            .header-buttons {
                width: 100%;
                justify-content: center;
            }

            .container {
                padding: 20px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .table-section {
                overflow-x: auto;
            }

            .routes-table {
                font-size: 0.85rem;
            }

            .routes-table th,
            .routes-table td {
                padding: 12px 10px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-section">
            <div class="logo">🚚 Busca CEP</div>
            <div class="breadcrumb">
                <span class="breadcrumb-dot"></span>
                <span>Gestão de Carregamento & Operações</span>
            </div>
        </div>
        
        <div class="search-box-container">
            <input type="text" class="search-box" id="mainSearch" placeholder="Digite um CEP ou um Endereço...* Não utilize nº de casa/apto/lote/prédio ou abreviação.">
        </div>

        <div class="header-buttons">
            <button class="btn btn-delete" onclick="limparDados()">🗑️ Limpar</button>
            <button class="btn btn-export" onclick="exportarDados()">⬇️ Exportar</button>
            <button class="btn btn-file" onclick="carregarArquivo()">🗂️ Trocar Arquivo</button>
        </div>
    </div>

    <div class="container">
        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon blue">🚚</div>
                <div class="stat-label">Total de Rotas</div>
                <div class="stat-status">Status: Ativo</div>
                <div class="stat-value" id="totalRoutes">0</div>
            </div>

            <div class="stat-card">
                <div class="stat-icon orange">📦</div>
                <div class="stat-label">Pacotes Consolidados</div>
                <div class="stat-label">Volume Diário</div>
                <div class="stat-value" id="totalPackages">0</div>
            </div>

            <div class="stat-card">
                <div class="stat-icon green">📋</div>
                <div class="stat-label">Cargo Van (Small) R2.0</div>
                <div class="stat-detail" id="routeDetails">1 de 4 h o 19 de 6 h</div>
            </div>
        </div>

        <div class="table-section">
            <div class="table-header">
                <h2 class="section-title">
                    <span class="section-title-icon">📋</span>
                    Listagem Detalhada
                </h2>
                <input type="text" class="search-input" id="tableSearch" placeholder="Pesquisar por ID ou Veículo...">
            </div>

            <div id="loadingSpinner" class="loading" style="display: none;">
                <div class="spinner"></div>
            </div>

            <table class="routes-table" id="routesTable" style="display: table;">
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>ID Rota (Tratado)</th>
                        <th>Modelo do Veículo</th>
                        <th>Qtd. Pacotes</th>
                    </tr>
                </thead>
                <tbody id="routesTableBody">
                </tbody>
            </table>
        </div>

        <div class="addresses-section">
            <div class="addresses-header">
                <span>TBR</span>
                <span>ENDEREÇO</span>
            </div>
            <table class="addresses-table" id="addressesTable">
                <tbody id="addressesTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Dados de exemplo
        let routesData = [
            { date: '2026-06-16', id: 'RX1', vehicle: 'Cargo Van (Small) R2.0', packages: 7 },
            { date: '2026-06-16', id: 'AX1', vehicle: 'Cargo Van (Small) R2.0', packages: 18 }
        ];

        let addressesData = [
            { tbr: 'TBR376196957', address: 'Rua Fernão Lopes 1907, apt 309 Parque Taquaral, Campinas, SP' },
            { tbr: 'TBR375758387', address: 'Rua Fernão Lopes 1.907, Apt 213 Parque Taquaral, Campinas, SP' },
            { tbr: 'TBR376157069', address: 'Rua Doutor Rocha Novais 372, Jardim Eulina, Campinas, SP' },
            { tbr: 'TBR375875730', address: 'Rua doutor Oswaldo da silveira neves nº 76, Campinas, Sp' },
            { tbr: 'TBR375822613', address: 'Rua Hermano Ribeiro da Silva 193, Jardim Eulina, Campinas, SP' },
            { tbr: 'TBR375868182', address: 'Rua Hermano Ribeiro da Silva 505, Jardim Eulina, Campinas, SP' },
            { tbr: 'TBR375884201', address: 'Rua Hermano Ribeiro da Silva 505, Jardim Eulina, Campinas, SP' },
            { tbr: 'TBR375825950', address: 'Avenida Transamazônica 1470, Bloco D AP 21 Jardim Garcia, Campinas, SP' },
            { tbr: 'TBR376090305', address: 'Rua professor Dante Alighieri Vita 290, Campinas, SP' },
            { tbr: 'TBR375905658', address: 'Rua Alfredo Battibugli 53, Torre 2 ap 47 Jardim Garcia, Campinas, SP' },
            { tbr: 'TBR375645019', address: 'Rua Doutor Vicente Torregrossa 315, CASA Jardim Garcia, Campinas, SP' }
        ];

        // Funções
        function renderData() {
            renderRoutes();
            renderAddresses();
            updateStats();
        }

        function renderRoutes() {
            const tbody = document.getElementById('routesTableBody');
            tbody.innerHTML = '';
            
            routesData.forEach(route => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="date-cell">${route.date}</td>
                    <td><span class="route-id">${route.id}</span></td>
                    <td class="vehicle-name">${route.vehicle}</td>
                    <td><span class="package-badge">${route.packages}</span></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function renderAddresses() {
            const tbody = document.getElementById('addressesTableBody');
            tbody.innerHTML = '';
            
            addressesData.forEach(addr => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="tbr-code">${addr.tbr}</td>
                    <td class="address-text">${addr.address}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function updateStats() {
            document.getElementById('totalRoutes').textContent = routesData.length;
            document.getElementById('totalPackages').textContent = addressesData.length;
        }

        function buscarCEP(cep) {
            const mainSearch = document.getElementById('mainSearch').value.trim();
            if (!mainSearch) return;

            showLoading(true);
            
            // Simular busca
            setTimeout(() => {
                showLoading(false);
                showSuccess('Dados carregados com sucesso!');
            }, 1000);
        }

        function limparDados() {
            if (confirm('Tem certeza que deseja limpar todos os dados?')) {
                routesData = [];
                addressesData = [];
                renderData();
                showSuccess('Dados limpos com sucesso!');
            }
        }

        function exportarDados() {
            const data = {
                routes: routesData,
                addresses: addressesData,
                exportDate: new Date().toLocaleString('pt-BR')
            };
            
            const json = JSON.stringify(data, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `carregamento_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            showSuccess('Dados exportados com sucesso!');
        }

        function carregarArquivo() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        routesData = data.routes || [];
                        addressesData = data.addresses || [];
                        renderData();
                        showSuccess('Arquivo carregado com sucesso!');
                    } catch (err) {
                        showError('Erro ao carregar arquivo. Certifique-se que é um JSON válido.');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function showLoading(show) {
            document.getElementById('loadingSpinner').style.display = show ? 'flex' : 'none';
            document.getElementById('routesTable').style.display = show ? 'none' : 'table';
        }

        function showError(msg) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = msg;
            errorDiv.classList.add('show');
            setTimeout(() => errorDiv.classList.remove('show'), 5000);
        }

        function showSuccess(msg) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = msg;
            successDiv.classList.add('show');
            setTimeout(() => successDiv.classList.remove('show'), 3000);
        }

        // Busca em tempo real
        document.getElementById('mainSearch').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                buscarCEP(e.target.value);
            }
        });

        document.getElementById('tableSearch').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            document.querySelectorAll('#routesTableBody tr').forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(searchTerm) ? '' : 'none';
            });
        });

        // Inicializar
        renderData();
    </script>
</body>
</html>
